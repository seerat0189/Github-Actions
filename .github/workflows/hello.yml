name: My First Workflow 

on: pull_request

jobs: 
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello, GitHub Actions!"

      - name: Print second message
        run: echo "Hello there!"

  say-bye:
    runs-on: ubuntu-latest
    needs: say-hello

    steps:
      - name: Print bye message
        run: echo "Say bye"

