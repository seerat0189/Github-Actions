name: My First Workflow 

on: pull_request

jobs: 
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List file
        run: ls

      - name: Setup node
        uses: actions/setup-node@v4
        with: 
          node-version: 24

      - name: Check node version
        run: node -v

      - name: Download dependencies
        run: npm i

      - name: Run test
        run: npm run test
